<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calculator — Demo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <h1 class="title">Calculator</h1>
    <button id="themeToggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
      <!-- theme icon inlined via JS fallback if needed -->
    </button>
  </div>
</header>

<main class="container" id="main">
  <section class="calculator" aria-label="Calculator" role="application">
    <div class="display" id="display" role="region" aria-live="polite" aria-atomic="true">
      <div class="expression" id="expression" tabindex="0" aria-label="Expression">0</div>
      <div class="result" id="result" aria-label="Result">0</div>
    </div>

    <div class="kbd-grid" role="group" aria-label="Calculator keypad">
      <!-- Buttons generated by JS -->
    </div>
  </section>
</main>

<footer class="container footer">
  <p>Keyboard: digits, + - * / . Enter =, Backspace, Escape (clear). Precision configurable in <code>script.js</code>.</p>
</footer>

<script src="script.js" defer></script>
</body>
</html>
